<h1>Dashboard</h1>

<h2>Your Cards</h2>
{% for card in cards %}
  <p>{{ card.title }} - ${{ card.price }}</p>
{% empty %}
  <p>No cards listed.</p>
{% endfor %}

<h2>Your Orders</h2>
{% for order in orders %}
  <p>Order ${{ order.total }} - {{ order.created_at }}</p>
{% empty %}
  <p>No orders yet.</p>
{% endfor %}
