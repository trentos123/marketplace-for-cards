{% extends "marketplace/base.html" %}

{% block content %}

<div style="
    max-width:420px;
    margin:60px auto;
    background:#1a1a22;
    padding:25px;
    border-radius:14px;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
">

<h2 style="margin-bottom:15px;">Create Account</h2>

<form method="POST">
    {% csrf_token %}
    {{ form.as_p }}

    <button type="submit" style="
        width:100%;
        padding:10px;
        background:#7c5cff;
        color:white;
        border:none;
        border-radius:10px;
        cursor:pointer;
        margin-top:10px;
    ">
        Register
    </button>
</form>

<p style="margin-top:15px;">
    Already have an account?
    <a href="/accounts/login/" style="color:#7c5cff;">Login</a>
</p>

</div>

{% endblock %}
